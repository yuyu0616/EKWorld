<!doctype html>
<html lang="ja">
<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YouTube分析</title>
    <link rel="stylesheet" href="style.css" />
    <!-- Marked.js for Markdown parsing -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        .markdown-container {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            margin-top: 20px;
            text-align: left;
            min-height: 200px;
            color: #333;
        }
        
        /* Basic Markdown Styles */
        .markdown-body h1, .markdown-body h2, .markdown-body h3 {
            color: var(--primary);
            border-bottom: 2px solid var(--primary-light);
            padding-bottom: 8px;
            margin-top: 24px;
            margin-bottom: 16px;
        }
        
        .markdown-body p {
            line-height: 1.6;
            margin-bottom: 16px;
        }

        .markdown-body ul, .markdown-body ol {
            padding-left: 24px;
            margin-bottom: 16px;
        }

        .markdown-body code {
            background: #f0f0f0;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: monospace;
        }

        .markdown-body pre {
            background: #282c34;
            color: #abb2bf;
            padding: 16px;
            border-radius: 8px;
            overflow-x: auto;
        }

        .markdown-body pre code {
            background: transparent;
            color: inherit;
            padding: 0;
        }

        .markdown-body blockquote {
            border-left: 4px solid var(--accent);
            padding-left: 16px;
            margin-left: 0;
            color: #666;
        }

        .markdown-body a {
            color: var(--accent);
            text-decoration: none;
        }

        .markdown-body a:hover {
            text-decoration: underline;
        }
        
        .loading-text {
            text-align: center;
            color: var(--primary);
            font-weight: bold;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-btn">← メニューへ戻る</a>
    <div id="app">
        <h1 style="color: var(--primary); margin-bottom: 24px;">Markdown Preview</h1>

        <div class="markdown-container">
            <div id="content-loader" class="loading-text" style="display: none;">データを読み込み中...</div>
            <div id="markdown-content" class="markdown-body">
                <!-- Markdown content will be rendered here -->
            </div>
        </div>
    </div>
    <script src="YouTubeAnalysis.js"></script>
</body>
</html>
