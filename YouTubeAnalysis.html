<!doctype html>
<html lang="ja">
<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YouTube分析</title>
    <link rel="stylesheet" href="style.css" />
    <!-- Marked.js for Markdown parsing -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        .markdown-container {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            margin-top: 20px;
            text-align: left;
            min-height: 200px;
            color: #333;
        }
        
        /* Basic Markdown Styles */
        .markdown-body h1 {
            color: var(--primary);
            border-bottom: 4px dashed var(--primary);
            padding-bottom: 8px;
            margin-top: 24px;
            margin-bottom: 20px;
            font-weight: 800;
        }

        .markdown-body h2 {
            color: var(--text-color);
            background-color: var(--accent);
            padding: 12px 20px;
            margin-top: 36px;
            margin-bottom: 24px;
            border: 3px solid var(--text-color);
            border-radius: 12px;
            box-shadow: 4px 4px 0px var(--text-color);
            font-weight: 800;
        }

        .markdown-body h3 {
            color: var(--primary-dark);
            padding: 8px 16px;
            margin-top: 24px;
            margin-bottom: 8px;
            font-weight: 800;
            display: inline-block;
        }

        .markdown-body h4, .markdown-body h5 {
            color: var(--primary-dark);
            background-color: var(--white);
            border: 3px solid var(--primary);
            border-radius: 8px;
            padding: 8px 16px;
            margin-top: 28px;
            margin-bottom: 16px;
            box-shadow: 3px 3px 0px var(--primary);
            font-weight: 800;
            display: inline-block;
            width: fit-content;
        }
        
        .markdown-body p {
            line-height: 1.6;
            margin-bottom: 16px;
        }

        .markdown-body ul, .markdown-body ol {
            padding-left: 24px;
            margin-bottom: 24px;
        }

        .markdown-body code {
            background: #f0f0f0;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: monospace;
        }

        .markdown-body pre {
            background: #282c34;
            color: #abb2bf;
            padding: 16px;
            border-radius: 8px;
            overflow-x: auto;
        }

        .markdown-body pre code {
            background: transparent;
            color: inherit;
            padding: 0;
        }

        .markdown-body blockquote {
            border-left: 4px solid var(--accent);
            padding-left: 16px;
            margin-left: 0;
            color: #666;
        }

        .markdown-body a {
            color: var(--accent);
            text-decoration: none;
        }

        .markdown-body a:hover {
            text-decoration: underline;
        }
        
        .loading-text {
            text-align: center;
            color: var(--primary);
            font-weight: bold;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }
        .pagination-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 30px 0; /* 上下の余白も少し増やします */
            padding: 16px 20px; /* 内側の余白も少し増やします */
            background: rgba(255, 255, 255, 0.9);
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.05);
            gap: 24px; /* ボタンが近づきすぎないように最低限の隙間を設ける */
        }

        .page-btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px; /* ボタン自体も少し大きく */
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: opacity 0.2s;
            white-space: nowrap; /* テキストの折り返しを防ぐ */
        }

        .page-btn:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        .page-btn:not(:disabled):hover {
            opacity: 0.8;
        }

        .page-info {
            font-weight: bold;
            color: var(--primary);
            margin: 0 20px; /* 中央のテキストの左右にも余白を追加 */
            white-space: nowrap;
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-btn">← メニューへ戻る</a>
    <div id="app">
        <h1 style="color: var(--primary); margin-bottom: 24px;">トレンド分析</h1>

        <div id="content-loader" class="loading-text" style="display: none;">データを読み込み中...</div>
        
        <div id="pagination-top" class="pagination-container" style="display: none;"></div>

        <div id="history-container">
            <!-- Markdown content will be rendered here dynamically -->
        </div>

        <div id="pagination-bottom" class="pagination-container" style="display: none;"></div>
    </div>
    <script src="YouTubeAnalysis.js"></script>
</body>
</html>
