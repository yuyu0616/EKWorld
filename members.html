<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>メンバー一覧 - ゆるすと！</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
      .members-grid {
        display: flex;
        flex-wrap: wrap;
        gap: 20px;
        justify-content: center;
        width: 100%;
        margin-top: 40px;
      }
      .member-card {
        flex: 1 1 200px;
        max-width: 250px;
        background-color: var(--white);
        border: 4px solid var(--text-color);
        border-radius: 20px;
        box-shadow: 6px 6px 0px var(--text-color);
        padding: 20px;
        text-align: center;
        cursor: pointer;
        transition: transform 0.2s, box-shadow 0.2s;
        animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      }
      .member-card:hover {
        transform: translate(-4px, -4px);
        box-shadow: 10px 10px 0px var(--primary);
      }
      .member-card:active {
        transform: translate(2px, 2px);
        box-shadow: 4px 4px 0px var(--primary);
      }
      .member-icon {
        width: 100px;
        height: 100px;
        border-radius: 50%;
        background-color: var(--secondary);
        border: 4px solid var(--text-color);
        margin: 0 auto 16px auto;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 50px;
        color: white;
        box-shadow: inset 0 -4px 0 rgba(0,0,0,0.1);
      }
      .member-name {
        font-size: 24px;
        font-weight: 800;
        color: var(--text-color);
      }
      
      /* Status Modal Customization */
      .status-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
        margin-top: 20px;
        text-align: left;
      }
      .status-item {
        background: #f1f5f9;
        padding: 12px;
        border-radius: 12px;
        border: 3px solid var(--text-color);
        box-shadow: 3px 3px 0px var(--text-color);
        font-weight: 700;
        transition: transform 0.2s;
      }
      .status-item:hover {
        transform: translateY(-2px);
      }
      .status-label {
        font-size: 14px;
        color: #64748b;
        margin-bottom: 4px;
        font-weight: 800;
      }
      .status-value {
        font-size: 24px;
        color: var(--primary);
        font-weight: 900;
        text-shadow: 1px 1px 0px rgba(0,0,0,0.1);
      }
      .modal-header {
          display: flex;
          align-items: center;
          gap: 16px;
          margin-bottom: 20px;
          border-bottom: 3px dashed #cbd5e1;
          padding-bottom: 16px;
      }
      .modal-member-icon {
          width: 80px;
          height: 80px;
          border-radius: 50%;
          border: 4px solid var(--text-color);
          display: flex;
          align-items: center;
          justify-content: center;
          font-size: 40px;
          color: white;
          box-shadow: inset 0 -4px 0 rgba(0,0,0,0.1);
      }
      .modal-desc-box {
          margin-top: 20px;
          text-align: left;
          background: #fffbea;
          padding: 16px;
          border-radius: 12px;
          border: 3px solid var(--accent);
      }
    </style>
  </head>
  <body>
    <a href="index.html" class="back-btn">← メニューへ戻る</a>
    
    <div id="app">
        <h1>メンバー一覧</h1>
        
        <div class="members-grid" id="members-container">
            <!-- Members will be injected by JS -->
        </div>
    </div>

    <!-- Status Modal -->
    <div id="status-modal" class="modal-overlay hidden">
        <div class="modal-content" id="status-modal-content">
            <div class="modal-header">
                <div class="modal-member-icon" id="modal-icon"></div>
                <h2 id="modal-name" style="margin: 0; color: var(--text-color); font-size: 32px; letter-spacing: 2px;"></h2>
            </div>
            
            <div class="chart-wrapper" style="background: #fff; border: 3px solid var(--text-color); border-radius: 12px; padding: 20px; box-shadow: 3px 3px 0px var(--text-color); margin: 20px auto; max-width: 320px; aspect-ratio: 1/1; box-sizing: border-box;">
                <div class="chart-container" style="position: relative; width: 100%; height: 100%;">
                    <canvas id="statusChart"></canvas>
                </div>
            </div>
            
            <div class="status-grid">
                <div class="status-item">
                    <div class="status-label">HP (体力)</div>
                    <div class="status-value" id="modal-hp"></div>
                </div>
                <div class="status-item">
                    <div class="status-label">MP (魔力)</div>
                    <div class="status-value" id="modal-mp"></div>
                </div>
                <div class="status-item">
                    <div class="status-label">ATK (攻撃力)</div>
                    <div class="status-value" id="modal-atk"></div>
                </div>
                <div class="status-item">
                    <div class="status-label">DEF (防御力)</div>
                    <div class="status-value" id="modal-def"></div>
                </div>
            </div>
            
            <div class="modal-desc-box">
                <div class="status-label" style="color: var(--accent);">◆ 特徴</div>
                <p id="modal-desc" style="font-weight: 800; color: var(--text-color); margin: 8px 0 0 0; line-height: 1.5; font-size: 16px;"></p>
            </div>
            
            <div class="modal-actions" style="margin-top: 32px;">
                <button class="btn btn-close" onclick="closeStatusModal()" style="width: 100%;">とじる</button>
            </div>
        </div>
    </div>
    
    <script src="members.js"></script>
  </body>
</html>
