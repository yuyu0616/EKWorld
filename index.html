<!doctype html>
<html lang="ja">

<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EKWorld</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <!-- ローディングアニメーション -->
    <div id="loader-overlay">
        <div class="loader-content">
            <div class="loader-text">
                <span style="--i:1;">e</span>
                <span style="--i:2;">k</span>
                <span style="--i:3;">u</span>
                <span style="--i:4;">r</span>
                <span style="--i:5;">i</span>
                <span style="--i:6;">o</span>
                <span style="--i:7;">　</span>
                <span style="--i:8;">w</span>
                <span style="--i:9;">o</span>
                <span style="--i:10;">r</span>
                <span style="--i:11;">l</span>
                <span style="--i:12;">d</span>
                <span style="--i:13;">!</span>
            </div>
        </div>
    </div>

    <div id="app">
        <div class="menu-container">
            <a href="roulette.html" class="menu-card">
                ルーレット
            </a>
            <a href="mission.html" class="menu-card">
                ミッション
            </a>
            <a href="quote.html" class="menu-card">
                今日のアニメ名言
            </a>
            <a href="ito.html" class="menu-card" style="color: var(--primary);">
                ito (イト)
            </a>
            <a href="YouTubeAnalysis.html" class="menu-card" style="color: #9c27b0;">
                YouTubeトレンド分析
            </a>
            <div class="menu-card" style="color: var(--accent);" onclick="openPasswordModal()">
                🔒 目標設定
            </div>
            <!-- 今後コンテンツが増えたらここに追加 -->
        </div>
    </div>

    <!-- Password Modal -->
    <div id="password-modal" class="modal-overlay hidden">
        <div class="modal-content" id="modal-content-box">
            <h2 style="color: var(--primary); margin-top: 0;">秘密のページ 🔒</h2>
            <p style="margin-bottom: 24px; color: var(--text-color); font-weight: 700;">パスワードを入力してね！</p>
            <input type="password" id="password-input" class="modal-input" placeholder="パスワード" />
            <div style="color: #ef4444; font-size: 14px; margin-top: 8px; opacity: 0; font-weight: 700; transition: opacity 0.2s;" id="password-error">パスワードがちがうよ！</div>
            <div class="modal-actions">
                <button class="btn btn-close" onclick="closePasswordModal()">やめる</button>
                <button class="btn btn-unlock" onclick="checkPassword()">かいじょ！</button>
            </div>
        </div>
    </div>

    <script>
        window.addEventListener('load', () => {
            const loader = document.getElementById('loader-overlay');
            // 少し遅延を入れてアニメーションを見せる
            setTimeout(() => {
                loader.classList.add('loaded');
                setTimeout(() => {
                    loader.style.display = 'none';
                }, 500); // フェードアウトの時間
            }, 800);
        });

        // モーダル処理
        const modal = document.getElementById('password-modal');
        const passwordInput = document.getElementById('password-input');
        const passwordError = document.getElementById('password-error');
        const modalContentBox = document.getElementById('modal-content-box');

        function openPasswordModal() {
            modal.classList.remove('hidden');
            passwordInput.value = '';
            passwordError.style.opacity = '0';
            setTimeout(() => {
                passwordInput.focus();
            }, 100);
        }

        function closePasswordModal() {
            modal.classList.add('hidden');
        }

        async function hashString(str) {
            const encoder = new TextEncoder();
            const data = encoder.encode(str);
            const hashBuffer = await crypto.subtle.digest('SHA-256', data);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        async function checkPassword() {
            const password = passwordInput.value;
            const hashed = await hashString(password);
            const correctHash = '01063c8162c6f88bbbaf927b7cf4abb858b76d70934462ecd25d574ee038b9b3';
            if (hashed === correctHash) {
                // 正解
                window.location.href = `pdca.html?auth=${hashed}`;
            } else {
                // エラー
                passwordError.style.opacity = '1';
                modalContentBox.classList.remove('shake-error');
                // リフローを強制してアニメーションを再発火
                void modalContentBox.offsetWidth;
                modalContentBox.classList.add('shake-error');
                
                setTimeout(() => {
                    modalContentBox.classList.remove('shake-error');
                }, 400);
            }
        }

        // エンターキーでも解除できるようにする
        passwordInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                checkPassword();
            }
        });
    </script>
</body>

</html>
